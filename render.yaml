# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: Dashboard → New → Blueprint → connect this repo
# Or update an existing Web Service Build/Start commands to match below.

services:
  - type: web
    name: betting-scanner-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: .
    buildCommand: npm install -g pnpm@8.15.0 && pnpm install --no-frozen-lockfile && pnpm --filter api exec prisma generate && pnpm --filter api build && pnpm --filter api exec prisma migrate deploy
    startCommand: cd apps/api && node dist/main
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.19.0
      - key: DATABASE_URL
        value: file:./apps/api/prisma/dev.db
      - key: THE_ODDS_API_KEY
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false
      - key: FOOTBALL_DATA_TOKEN
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
